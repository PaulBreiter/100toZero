<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz Master - Auswahl</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .modes { display: flex; gap: 20px; }
        .card { width: 250px; padding: 30px; border-radius: 20px; text-align: center; cursor: pointer; border: 4px solid transparent; transition: 0.3s; }
        .space { background: #16213e; border-color: #0984e3; }
        .comic { background: #ffffff; color: #2d3436; border-color: #fdcb6e; }
        .card:hover { transform: translateY(-10px); }
        button { margin-top: 15px; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 10px; border: none; }
    </style>
</head>
<body>
    <h1>Wähle dein Design</h1>
    <div class="modes">
        <div class="card space" onclick="window.location.href='space.html'">
            <h2>Space Edition</h2>
            <button>Starten</button>
        </div>
        <div class="card comic" onclick="window.location.href='comic.html'">
            <h2>Comic Edition</h2>
            <button>Starten</button>
        </div>
    </div>
</body>
</html>
