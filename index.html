<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Auswahl</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; }
        .modes { display: flex; gap: 20px; margin-top: 30px; }
        .mode-card { width: 220px; padding: 25px; border-radius: 15px; cursor: pointer; transition: 0.3s; border: 3px solid transparent; text-align: center; }
        .space { background: #16213e; border-color: #4834d4; }
        .comic { background: #ffffff; color: #2d3436; border-color: #fab1a0; }
        .mode-card:hover { transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        button { margin-top: 15px; padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wähle dein Quiz-Design</h1>
        <div class="modes">
            <div class="mode-card space" onclick="window.location.href='space.html'">
                <h2>Space</h2>
                <p>Düster, Neon, Galaktisch</p>
                <button>Start</button>
            </div>
            <div class="mode-card comic" onclick="window.location.href='comic.html'">
                <h2>Comic</h2>
                <p>Bunt, Retro, Knallig</p>
                <button>Start</button>
            </div>
        </div>
    </div>
</body>
</html>
