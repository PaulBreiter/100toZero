<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brain Master - Menü</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e2f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 { font-size: 3rem; margin-bottom: 2rem; text-shadow: 0 0 10px #6c5ce7; }
        .menu-container { display: flex; gap: 20px; }
        .theme-card {
            width: 250px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid transparent;
        }
        .space { background: #2d3436; border-color: #0984e3; }
        .comic { background: #ffffff; color: #2d3436; border-color: #fdcb6e; }
        .theme-card:hover { transform: translateY(-10px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Wähle dein Abenteuer</h1>
    <div class="menu-container">
        <div class="theme-card space" onclick="window.location.href='space.html'">
            <h2>Space Edition</h2>
            <p>Intergalaktische Schätzfragen in den Tiefen des Alls.</p>
            <button>Starten</button>
        </div>
        <div class="theme-card comic" onclick="window.location.href='comic.html'">
            <h2>Comic Edition</h2>
            <p>Bunt, laut und voller Action! Der Quiz-Spaß im Retro-Look.</p>
            <button>Starten</button>
        </div>
    </div>
</body>
</html>
