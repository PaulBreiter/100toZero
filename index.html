<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZ PORTAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Orbitron:wght@700&display=swap');
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f0c29; color: white; font-family: sans-serif; }
        .container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; padding: 20px; }
        .card { width: 280px; height: 350px; border-radius: 25px; text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; border: 4px solid rgba(255,255,255,0.1); text-align: center; }
        .space { background: #030305; border-color: #ff0055; }
        .space:hover { transform: scale(1.05); box-shadow: 0 0 30px #ff0055; }
        .comic { background: white; border-color: #2d3436; }
        .comic:hover { transform: scale(1.05); box-shadow: 0 0 30px #6c5ce7; }
        h2 { margin: 10px 0; }
        .space h2 { font-family: 'Orbitron'; color: #ff0055; }
        .comic h2 { font-family: 'Montserrat'; color: #6c5ce7; }
        .btn { padding: 12px 25px; border-radius: 50px; border: none; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .btn-s { background: #ff0055; color: white; }
        .btn-c { background: #6c5ce7; color: white; }
    </style>
</head>
<body>
    <h1 style="font-family: 'Montserrat'; letter-spacing: 2px;">WÄHLE DEIN INTERFACE</h1>
    <div class="container">
        <a href="space.html" class="card space">
            <span style="font-size: 3rem;">🚀</span>
            <h2>SPACE MODE</h2>
            <div class="btn btn-s">START</div>
        </a>
        <a href="comic.html" class="card comic">
            <span style="font-size: 3rem;">⚡</span>
            <h2>COMIC MODE</h2>
            <div class="btn btn-c">START</div>
        </a>
    </div>
</body>
</html>
