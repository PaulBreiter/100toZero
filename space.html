<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Space Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #0b0c10; color: #66fcf1; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-box { width: 600px; background: #1f2833; padding: 30px; border-radius: 15px; border: 2px solid #45a29e; text-align: center; box-shadow: 0 0 20px #45a29e; }
        .screen { display: none; }
        .active { display: block; }
        .joker-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .joker { padding: 10px; border: 1px solid #45a29e; cursor: pointer; border-radius: 5px; min-width: 80px; }
        .joker.selected { background: #45a29e; color: #0b0c10; box-shadow: 0 0 15px #66fcf1; }
        .joker.used { opacity: 0.2; cursor: default; }
        input { background: transparent; border: 1px solid #45a29e; color: #66fcf1; padding: 10px; font-size: 1.2rem; text-align: center; width: 60%; margin: 20px 0; }
        button { background: #45a29e; color: #0b0c10; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        #hp-bar { color: #ff4d4d; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="game-box">
        <!-- Upload -->
        <div id="screen-upload" class="screen active">
            <h2>System-Initialisierung</h2>
            <p>Lade die Quiz-Daten (Excel) hoch:</p>
            <input type="file" id="upload" accept=".xlsx">
            <br><br>
            <button onclick="window.location.href='index.html'">Zurück zum Hauptmenü</button>
        </div>

        <!-- Game -->
        <div id="screen-game" class="screen">
            <div id="hp-bar">Schilde: <span id="hp">5000</span></div>
            <div id="q-info">Frage <span id="q-num">1</span>/20</div>
            <div class="joker-container">
                <div id="joker-50" class="joker" onclick="toggleJoker('50')">50:50</div>
                <div id="joker-hint" class="joker" onclick="toggleJoker('hint')">HINWEIS</div>
                <div id="joker-skip" class="joker" onclick="toggleJoker('skip')">SKIP</div>
            </div>
            <h3 id="question-text">...</h3>
            <input type="number" id="answer" placeholder="Eingabe...">
            <br>
            <button onclick="submitAnswer()">FEUERN</button>
        </div>
    </div>

    <script>
        let allQ = [], currentQ = [], idx = 0, hp = 5000, activeJoker = null, used = { '50': false, 'hint': false, 'skip': false };

        document.getElementById('upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = event => {
                const workbook = XLSX.read(new Uint8Array(event.target.result), {type: 'array'});
                allQ = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                start();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function start() {
            currentQ = allQ.sort(() => 0.5 - Math.random()).slice(0, 20);
            show('screen-game');
            update();
        }

        function toggleJoker(t) {
            if(used[t]) return;
            activeJoker = (activeJoker === t) ? null : t;
            updateUI();
        }

        function updateUI() {
            ['50', 'hint', 'skip'].forEach(t => {
                const el = document.getElementById('joker-'+t);
                el.className = 'joker' + (used[t] ? ' used' : (activeJoker === t ? ' selected' : ''));
            });
        }

        function update() {
            document.getElementById('question-text').innerText = currentQ[idx].Frage;
            document.getElementById('hp').innerText = Math.round(hp);
            document.getElementById('q-num').innerText = idx + 1;
            document.getElementById('answer').value = "";
            updateUI();
        }

        function submitAnswer() {
            const val = parseFloat(document.getElementById('answer').value);
            const correct = parseFloat(currentQ[idx].Antwort);
            if(isNaN(val) && activeJoker !== 'skip') return;

            if(activeJoker === 'skip') { used.skip = true; } 
            else if(activeJoker === 'hint') {
                alert("Hinweis: Der Wert liegt etwa bei " + (correct * (0.8 + Math.random()*0.4)).toFixed(0));
                used.hint = true; activeJoker = null; updateUI(); return;
            } else {
                let diff = Math.abs(val - correct);
                if(activeJoker === '50') { diff /= 2; used['50'] = true; }
                hp -= diff;
            }
            activeJoker = null; idx++;
            if(hp <= 0 || idx >= 20) alert(hp > 0 ? "Sieg!" : "Mission gescheitert!");
            else update();
        }

        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
