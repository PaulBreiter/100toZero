<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pulse // Space Edition</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #020408;
            --panel: rgba(13, 22, 38, 0.85);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --green: #00ffaa;
            --red: #ff4757;
            --text: #e0e6ed;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #0a192f 0%, #020408 100%);
        }

        /* HEADER */
        header {
            padding: 10px 15px; background: rgba(0,0,0,0.9);
            border-bottom: 2px solid var(--accent);
            display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px;
            z-index: 100;
        }
        .logo { font-family: 'Orbitron'; color: var(--accent); font-size: 1rem; font-weight: 700; letter-spacing: 1px; }
        
        .nav-group { display: flex; gap: 8px; }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--accent);
            color: var(--accent); padding: 6px 10px; border-radius: 4px;
            font-size: 0.75rem; cursor: pointer; font-family: 'Orbitron';
        }

        /* MAIN LAYOUT */
        .game-wrapper {
            display: flex; flex: 1; overflow: hidden; padding: 15px; gap: 20px;
        }

        /* SIDEBAR (Desktop) / TOPBAR (Mobile) */
        .stats-area {
            width: 260px; display: flex; flex-direction: column; gap: 15px;
        }

        .glass-card {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 15px; backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .stat-row { margin-bottom: 10px; }
        .label { font-size: 0.65rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
        .val { font-family: 'Orbitron'; font-size: 1.2rem; display: block; }

        .hp-container { height: 8px; background: #111; border-radius: 4px; overflow: hidden; margin-top: 5px; border: 1px solid #333; }
        #hp-bar { height: 100%; width: 100%; background: var(--green); transition: 0.4s; }

        .joker-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 5px; }
        .joker-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 2px; border-radius: 4px; cursor: pointer; color: #fff; font-size: 0.6rem;
        }
        .joker-btn.active { border-color: var(--accent); background: var(--accent-glow); }
        .joker-btn.used { opacity: 0.2; pointer-events: none; }

        /* GRID AREA */
        .grid-area { flex: 1; overflow-y: auto; }
        .quiz-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px; max-width: 1200px; margin: 0 auto;
        }

        .card {
            background: var(--panel); border: 1px solid rgba(255,255,255,0.05);
            padding: 25px 15px; border-radius: 12px; text-align: center;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 0 15px var(--accent-glow); }
        .card.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }
        .card .cat-title { font-weight: 600; font-size: 1rem; display: block; margin-bottom: 5px; }
        .card .count { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--accent); }

        .btn-core {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            background: var(--accent); color: #000; font-family: 'Orbitron';
            font-weight: 700; cursor: pointer; margin-top: auto;
        }

        /* OVERLAYS */
        .overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,5,15,0.95);
            z-index: 1000; align-items: center; justify-content: center; padding: 20px;
        }
        .overlay-box {
            background: #0d1626; border: 1px solid var(--accent); padding: 30px;
            border-radius: 15px; width: 100%; max-width: 500px; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: var(--accent); }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 800px) {
            header { grid-template-columns: 1fr; }
            .nav-group { justify-content: center; width: 100%; }
            .game-wrapper { flex-direction: column; overflow-y: auto; }
            .stats-area { width: 100%; flex-direction: row; flex-wrap: wrap; }
            .glass-card { flex: 1; min-width: 140px; padding: 10px; }
            .quiz-grid { grid-template-columns: 1fr 1fr; }
            .card { padding: 15px 10px; }
            .btn-core { margin-top: 10px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">QUIZ PULSE // SPACE</div>
        <div class="nav-group">
            <button class="nav-btn" onclick="openOverlay('guide')">GUIDE</button>
            <button class="nav-btn" onclick="openOverlay('rank')">RANK</button>
            <button class="nav-btn" onclick="location.href='index.html'">MENU</button>
        </div>
    </header>

    <div class="game-wrapper">
        <aside class="stats-area">
            <div class="glass-card">
                <div class="stat-row">
                    <span class="label">System HP</span>
                    <span class="val" id="hp-txt">100</span>
                    <div class="hp-container"><div id="hp-bar"></div></div>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <div><span class="label">Score</span><span class="val" id="score-txt">0</span></div>
                    <div style="text-align:right;"><span class="label">Sektor</span><span class="val" id="q-txt">0/20</span></div>
                </div>
            </div>

            <div class="glass-card">
                <span class="label">Joker-Module</span>
                <div class="joker-grid">
                    <button id="j-Schild" class="joker-btn" onclick="useJoker('Schild')">🛡️ Shield</button>
                    <button id="j-Trank" class="joker-btn" onclick="useJoker('Trank')">🧪 Nano</button>
                    <button id="j-Schwert" class="joker-btn" onclick="useJoker('Schwert')">⚔️ Boost</button>
                </div>
            </div>

            <button class="btn-core" onclick="document.getElementById('excel-input').click()">LOAD DATA CORE</button>
            <input type="file" id="excel-input" style="display:none" accept=".xlsx, .xls">
        </aside>

        <main class="grid-area">
            <div id="game-grid" class="quiz-grid">
                <!-- Karten erscheinen hier -->
            </div>
        </main>
    </div>

    <!-- OVERLAY: GUIDE -->
    <div id="overlay-guide" class="overlay">
        <div class="overlay-box">
            <span class="close-x" onclick="closeOverlay('guide')">&times;</span>
            <h2 style="color:var(--accent); font-family: 'Orbitron';">PILOT MANUAL</h2>
            <p>Schätze die Antwort so genau wie möglich. Jede Abweichung zieht HP ab. Ein Volltreffer heilt dich!</p>
        </div>
    </div>

    <!-- OVERLAY: RANKING -->
    <div id="overlay-rank" class="overlay">
        <div class="overlay-box">
            <span class="close-x" onclick="closeOverlay('rank')">&times;</span>
            <h2 style="color:var(--accent); font-family: 'Orbitron';">TOP PILOTS</h2>
            <div id="rank-content"><i>Lade Datenbank...</i></div>
        </div>
    </div>

    <!-- QUIZ MODAL -->
    <div id="modal-quiz" class="overlay" style="background: rgba(0,0,0,0.98);">
        <div class="overlay-box" style="text-align: center;">
            <div id="m-cat" style="color:var(--accent); font-size:0.8rem; margin-bottom:10px;">SEKTOR</div>
            <h2 id="m-q" style="margin-bottom: 20px;">Lade Frage...</h2>
            <input type="number" id="ans-input" style="width:100%; padding:15px; background:#000; border:1px solid var(--accent); color:#fff; font-size:1.8rem; text-align:center; border-radius:8px;">
            <div id="m-feedback" style="margin: 15px 0; font-weight: bold; min-height: 20px;"></div>
            <button id="btn-submit" class="btn-core" onclick="checkAnswer()">SEND ENERGY</button>
            <button id="btn-next" class="btn-core" style="display:none;" onclick="nextRound()">NEXT SECTOR</button>
        </div>
    </div>

    <script>
        let questions = [], hp = 100, score = 0, qCounter = 0, currentIdx = -1;
        let catUsage = {}, usedJokers = { Schild:false, Trank:false, Schwert:false }, activeJoker = null;

        function openOverlay(id) { document.getElementById('overlay-' + id).style.display = 'flex'; }
        function closeOverlay(id) { document.getElementById('overlay-' + id).style.display = 'none'; }

        window.onload = () => {
            const saved = localStorage.getItem('p0_v3');
            if(saved) { questions = JSON.parse(saved); renderBoard(); }
            document.getElementById('excel-input').addEventListener('change', handleFile, false);
        };

        function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                questions = json.map(row => {
                    const getVal = (names) => {
                        const key = Object.keys(row).find(k => names.includes(k.toLowerCase().trim()));
                        return key ? row[key] : null;
                    };
                    return {
                        cat: getVal(['kategorie', 'cat', 'thema']) || "Orbit",
                        q: getVal(['frage', 'question', 'q']) || "Defekt",
                        a: parseInt(getVal(['antwort', 'answer', 'a'])) || 0,
                        used: false
                    };
                });
                localStorage.setItem('p0_v3', JSON.stringify(questions));
                renderBoard();
            };
            reader.readAsArrayBuffer(file);
        }

        function renderBoard() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            const cats = [...new Set(questions.map(q => q.cat))];
            cats.forEach(cat => {
                const count = catUsage[cat] || 0;
                const card = document.createElement('div');
                card.className = "card" + (count >= 2 ? " disabled" : "");
                card.innerHTML = `<span class="cat-title">${cat}</span><span class="count">${count}/2</span>`;
                if(count < 2) card.onclick = () => {
                    const pool = questions.filter(q => q.cat === cat && !q.used);
                    if(pool.length) {
                        currentIdx = questions.indexOf(pool[Math.floor(Math.random()*pool.length)]);
                        catUsage[cat] = count + 1;
                        openQuestion(questions[currentIdx]);
                    }
                };
                grid.appendChild(card);
            });
            updateUI();
        }

        function openQuestion(q) {
            document.getElementById('m-cat').innerText = q.cat;
            document.getElementById('m-q').innerText = q.q;
            document.getElementById('ans-input').value = "";
            document.getElementById('m-feedback').innerText = "";
            document.getElementById('btn-submit').style.display = "block";
            document.getElementById('btn-next').style.display = "none";
            document.getElementById('modal-quiz').style.display = "flex";
            document.getElementById('ans-input').focus();
        }

        function checkAnswer() {
            const q = questions[currentIdx];
            const guess = parseInt(document.getElementById('ans-input').value);
            if(isNaN(guess)) return;
            let diff = Math.abs(guess - q.a);
            if(activeJoker === 'Schild' && diff > 10) diff = 10;
            if(activeJoker === 'Trank') diff = Math.floor(diff/2);

            if(diff === 0) {
                hp = Math.min(100, hp + 5); score += 250;
                document.getElementById('m-feedback').innerHTML = "<span style='color:var(--green)'>CRITICAL HIT! +5 HP</span>";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                hp -= diff; score += Math.max(0, 100 - diff);
                document.getElementById('m-feedback').innerHTML = `<span style='color:var(--red)'>DAMAGE: -${diff} HP</span><br><small>Target: ${q.a}</small>`;
            }
            q.used = true; qCounter++; activeJoker = null;
            document.querySelectorAll('.joker-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-submit').style.display = "none";
            document.getElementById('btn-next').style.display = "block";
            updateUI();
        }

        function nextRound() {
            document.getElementById('modal-quiz').style.display = "none";
            if(hp <= 0) { alert("SYSTEM COLLAPSE. SCORE: " + score); location.reload(); }
            if(qCounter >= 20) { alert("MISSION COMPLETE! SCORE: " + score); location.reload(); }
            renderBoard();
        }

        function updateUI() {
            document.getElementById('hp-txt').innerText = hp;
            document.getElementById('hp-bar').style.width = hp + "%";
            document.getElementById('hp-bar').style.background = hp < 30 ? "var(--red)" : "var(--green)";
            document.getElementById('score-txt').innerText = score;
            document.getElementById('q-txt').innerText = qCounter + "/20";
        }

        function useJoker(type) {
            if(usedJokers[type] || activeJoker) return;
            activeJoker = type; usedJokers[type] = true;
            document.getElementById('j-'+type).classList.add('active', 'used');
        }
    </script>
</body>
</html>
