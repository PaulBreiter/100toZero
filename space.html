<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pulse: Space Edition</title>
    <!-- High Budget Tools -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #00d2ff;
            --panel: rgba(15, 25, 40, 0.9);
            --green: #00ffaa;
            --red: #ff4757;
            --text: #e0e0e0;
        }

        /* Dynamischer Sternenhimmel */
        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: -10000px 5000px; }
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #05070a 100%);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 100px 150px, #00d2ff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 200px 50px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            animation: moveStars 250s linear infinite;
            opacity: 0.4; z-index: -1;
        }

        header { padding: 15px 25px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 20px rgba(0,210,255,0.3); }
        .logo { font-family: 'Orbitron'; font-weight: 700; font-size: 1.4rem; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; }

        .game-container { flex: 1; display: flex; gap: 20px; padding: 20px; overflow: hidden; }
        
        /* Stats Panel */
        .stats-panel { width: 280px; background: var(--panel); border: 1px solid rgba(0,210,255,0.2); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 20px; backdrop-filter: blur(10px); }
        .stat-box { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .stat-label { font-size: 0.8rem; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; }
        .stat-value { font-family: 'Orbitron'; font-size: 1.5rem; }

        .hp-bar { height: 12px; background: #222; border-radius: 6px; overflow: hidden; margin-top: 10px; border: 1px solid #444; }
        #hp-bar-fill { height: 100%; width: 100%; background: var(--green); transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 0 10px var(--green); }

        /* Board Area */
        .board-area { flex: 1; display: flex; flex-direction: column; gap: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; overflow-y: auto; padding-right: 10px; }
        
        .card { 
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; 
            text-align: center; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,210,255,0.4); }
        .card.disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }

        /* Modal / Popups */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; backdrop-filter: blur(8px); align-items: center; justify-content: center; }
        .modal-content { background: #0f1928; border: 2px solid var(--accent); width: 90%; max-width: 500px; border-radius: 20px; padding: 30px; position: relative; box-shadow: 0 0 50px rgba(0,210,255,0.2); }
        
        .ans-input { width: 100%; background: #000; border: 1px solid var(--accent); color: #fff; padding: 15px; font-size: 2rem; text-align: center; font-family: 'Orbitron'; margin: 20px 0; border-radius: 10px; box-sizing: border-box;}
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn-primary:hover { background: #fff; box-shadow: 0 0 20px var(--accent); }

        /* Animation Classes */
        .shake { animation: shake 0.5s ease-in-out; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .winner { animation: pulseGreen 0.8s infinite alternate; }
        @keyframes pulseGreen { from { box-shadow: 0 0 10px var(--green); } to { box-shadow: 0 0 30px var(--green); } }

        footer { padding: 15px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; gap: 30px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-btn { color: var(--accent); text-decoration: none; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; }

        .joker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .joker-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; font-size: 0.7rem; cursor: pointer; text-align: center; }
        .joker-btn.active { border-color: var(--accent); background: rgba(0,210,255,0.2); }
        .joker-btn.used { opacity: 0.2; pointer-events: none; text-decoration: line-through; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Quiz Pulse <span style="font-weight:300; opacity:0.7">// Space</span></div>
        <div id="player-tag" style="font-weight: bold; color: var(--accent);">PILOT: ---</div>
    </header>

    <div class="game-container">
        <!-- Stats -->
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">System-Integrität (HP)</div>
                <div class="stat-value" id="hp-val">100</div>
                <div class="hp-bar"><div id="hp-bar-fill"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Mission Score</div>
                <div class="stat-value" id="score-val">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Fortschritt</div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span class="stat-value"><span id="q-count">0</span>/20</span>
                    <div id="boss-info" style="font-size:0.7rem; text-align:right;">Nächster Boss in:<br><b id="boss-timer" style="color:var(--red)">4</b></div>
                </div>
            </div>

            <div class="stat-label" style="margin-top:10px">Verfügbare Tech (Joker)</div>
            <div class="joker-grid">
                <div id="j-Schild" class="joker-btn" onclick="useJoker('Schild')">🛡️ SCHILD<br><small>Max -10 DMG</small></div>
                <div id="j-Trank" class="joker-btn" onclick="useJoker('Trank')">🧪 NANO-FIX<br><small>Halber DMG</small></div>
                <div id="j-Schwert" class="joker-btn" onclick="useJoker('Schwert')">⚔️ BOOST<br><small>+15 HP bei Fit</small></div>
            </div>

            <input type="file" id="excel-file" hidden accept=".xlsx" onchange="processExcel()">
            <button onclick="document.getElementById('excel-file').click()" style="margin-top:auto; font-size:0.7rem; padding:8px; opacity:0.5">Daten-Kern laden</button>
        </div>

        <!-- Board -->
        <div class="board-area">
            <div id="game-grid" class="grid"></div>
        </div>
    </div>

    <!-- Quiz Modal -->
    <div id="modal-quiz" class="modal">
        <div class="modal-content" id="modal-inner">
            <div id="m-cat" style="color:var(--accent); text-transform:uppercase; font-size:0.8rem; font-weight:700;">Kategorie</div>
            <h2 id="m-q" style="margin:15px 0; font-family:'Orbitron'; line-height:1.4;">Lade Übertragung...</h2>
            <input type="number" id="ans-input" class="ans-input" placeholder="000">
            <div id="m-feedback" style="text-align:center; min-height:50px; margin-bottom:15px; font-weight:bold;"></div>
            <button id="btn-submit" class="btn-primary" onclick="checkAnswer()">Senden</button>
            <button id="btn-next" class="btn-primary" style="display:none;" onclick="nextRound()">Nächster Sektor</button>
        </div>
    </div>

    <footer>
        <a href="index.html" class="nav-btn">⬅ ZURÜCK ZUM HUB</a>
    </footer>

    <script>
        // Supabase Init (Deine Daten einfügen)
        const supabaseUrl = 'DEINE_URL';
        const supabaseKey = 'DEIN_KEY';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // --- HIGH BUDGET SOUND ENGINE ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if(type === 'success') {
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else if(type === 'error') {
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if(type === 'click') {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        // Game State
        let questions = JSON.parse(localStorage.getItem('p0_v3')) || [];
        let hp = 100, score = 0, qCounter = 0, currentIdx = -1;
        let usedJokers = { Schild:false, Trank:false, Schwert:false }, activeJoker = null;
        let catUsage = {};
        const playerName = localStorage.getItem('quiz_username') || "Pilot";

        document.getElementById('player-tag').innerText = "PILOT: " + playerName;

        function processExcel() {
            const file = document.getElementById('excel-file').files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                questions = json.map(r => ({
                    cat: r.Kategorie || "System",
                    q: r.Frage,
                    a: parseInt(r.Antwort),
                    isBoss: (r.Boss && r.Boss.toString().toLowerCase() === 'ja'),
                    used: false
                }));
                localStorage.setItem('p0_v3', JSON.stringify(questions));
                location.reload();
            };
            reader.readAsArrayBuffer(file);
        }

        function renderBoard() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            const nextQ = qCounter + 1;

            if (nextQ % 4 === 0 || nextQ === 20) {
                const card = document.createElement('div');
                card.className = "card"; card.style.gridColumn = "1 / -1";
                card.style.background = "linear-gradient(45deg, #2c0000, #800000)";
                card.style.borderColor = "var(--red)";
                card.innerHTML = `<div style="font-family:'Orbitron'; color:var(--red)">⚠️ BOSS-SIGNAL ERFASST ⚠️</div><div style="font-size:0.7rem">Sektor ${nextQ}</div>`;
                card.onclick = () => {
                    playSound('click');
                    const bQ = questions.filter(q => q.isBoss && !q.used);
                    currentIdx = questions.indexOf(bQ.length > 0 ? bQ[0] : questions.find(q => !q.used));
                    openQuestion(questions[currentIdx]);
                };
                grid.appendChild(card);
            } else {
                [...new Set(questions.filter(q => !q.isBoss).map(q => q.cat))].forEach(cat => {
                    const u = catUsage[cat] || 0;
                    const card = document.createElement('div');
                    card.className = "card" + (u >= 2 ? " disabled" : "");
                    card.innerHTML = `<div style="font-size:0.7rem; color:var(--accent); font-weight:bold">${cat}</div><div style="font-size:0.6rem; opacity:0.5">Scans: ${u}/2</div>`;
                    if(u < 2) card.onclick = () => {
                        playSound('click');
                        const pool = questions.filter(q => q.cat === cat && !q.used);
                        if(pool.length === 0) return;
                        currentIdx = questions.indexOf(pool[Math.floor(Math.random()*pool.length)]);
                        catUsage[cat] = u + 1;
                        openQuestion(questions[currentIdx]);
                    };
                    grid.appendChild(card);
                });
            }
            updateUI();
        }

        function updateUI() {
            document.getElementById('hp-val').innerText = hp;
            document.getElementById('hp-bar-fill').style.width = Math.max(0, hp) + "%";
            document.getElementById('hp-bar-fill').style.backgroundColor = hp < 30 ? "var(--red)" : "var(--green)";
            document.getElementById('score-val').innerText = score;
            document.getElementById('q-count').innerText = qCounter;
            document.getElementById('boss-timer').innerText = (4 - (qCounter % 4)) || "!";
        }

        function useJoker(type) {
            if(usedJokers[type] || activeJoker) return;
            playSound('click');
            activeJoker = type;
            document.querySelectorAll('.joker-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('j-'+type).classList.add('active');
        }

        function openQuestion(q) {
            document.getElementById('m-cat').innerText = q.cat;
            document.getElementById('m-q').innerText = q.q;
            document.getElementById('m-feedback').innerText = "";
            document.getElementById('ans-input').value = "";
            document.getElementById('btn-submit').style.display = "block";
            document.getElementById('btn-next').style.display = "none";
            document.getElementById('modal-quiz').style.display = "flex";
        }

        function checkAnswer() {
            const q = questions[currentIdx];
            const guess = parseInt(document.getElementById('ans-input').value);
            const modal = document.getElementById('modal-inner');
            if(isNaN(guess)) return;

            let diff = Math.abs(guess - q.a);
            if(activeJoker === 'Schild' && diff > 10) diff = 10;
            if(activeJoker === 'Trank') diff = Math.floor(diff/2);

            if(diff === 0) {
                let heal = (activeJoker === 'Schwert') ? 15 : 5;
                hp = Math.min(100, hp + heal); score += 250;
                playSound('success');
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#00d2ff', '#00ffaa'] });
                modal.classList.add('winner');
                document.getElementById('m-feedback').innerHTML = `<span style="color:var(--green)">PRÄZISIONSTREFFER!<br>+250 Pkt & +${heal} HP Heilung</span>`;
            } else {
                hp -= diff; score += Math.max(0, 100 - diff);
                playSound('error');
                modal.classList.add('shake');
                document.getElementById('m-feedback').innerHTML = `<span style="color:var(--red)">FEHLSCHLAG: -${diff} HP<br><small>Korrekt: ${q.a}</small></span>`;
            }

            setTimeout(() => { modal.classList.remove('shake', 'winner'); }, 600);
            if(activeJoker) {
                usedJokers[activeJoker] = true;
                document.getElementById('j-'+activeJoker).classList.replace('active', 'used');
                activeJoker = null;
            }
            q.used = true; qCounter++;
            document.getElementById('btn-submit').style.display = "none";
            document.getElementById('btn-next').style.display = "block";
            updateUI();
        }

        async function nextRound() {
            document.getElementById('modal-quiz').style.display = "none";
            if(hp <= 0 || qCounter >= 20) {
                alert("MISSION BEENDET! Finaler Score: " + score);
                if(score > 0) await supabaseClient.from('highscores').insert([{ name: playerName, score: score }]);
                location.reload();
            } else renderBoard();
        }

        if(questions.length > 0) renderBoard();
    </script>
</body>
</html>
