<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Pulse: Space Edition</title>
    
    <!-- Libraries direkt von zuverlässigen CDNs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --accent: #00d2ff;
            --panel: rgba(15, 25, 40, 0.9);
            --green: #00ffaa;
            --red: #ff4757;
            --text: #e0e0e0;
        }

        @keyframes moveStars {
            from { background-position: 0 0; }
            to { background-position: -10000px 5000px; }
        }

        body {
            margin: 0; font-family: 'Rajdhani', sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #1b2735 0%, #05070a 100%);
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 200%; height: 200%;
            background-image: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 100px 150px, #00d2ff, rgba(0,0,0,0)),
                radial-gradient(1.5px 1.5px at 200px 50px, #fff, rgba(0,0,0,0));
            background-size: 300px 300px;
            animation: moveStars 250s linear infinite;
            opacity: 0.4; z-index: -1;
        }

        header { padding: 15px 25px; background: rgba(0,0,0,0.5); border-bottom: 2px solid var(--accent); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Orbitron'; font-weight: 700; font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; }

        .game-container { flex: 1; display: flex; gap: 20px; padding: 20px; overflow: hidden; }
        
        .stats-panel { width: 280px; background: var(--panel); border: 1px solid rgba(0,210,255,0.2); border-radius: 15px; padding: 20px; display: flex; flex-direction: column; gap: 15px; backdrop-filter: blur(10px); }
        .stat-box { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; border-left: 4px solid var(--accent); }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); }
        .stat-value { font-family: 'Orbitron'; font-size: 1.3rem; }

        .hp-bar { height: 10px; background: #222; border-radius: 5px; overflow: hidden; margin-top: 8px; }
        #hp-bar-fill { height: 100%; width: 100%; background: var(--green); transition: 0.5s ease-out; }

        .board-area { flex: 1; display: flex; flex-direction: column; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; overflow-y: auto; padding-bottom: 20px; }
        
        .card { 
            background: var(--panel); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 15px; 
            text-align: center; cursor: pointer; transition: 0.3s;
        }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 0 15px rgba(0,210,255,0.3); }
        .card.disabled { opacity: 0.3; cursor: not-allowed; filter: grayscale(1); }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #0f1928; border: 2px solid var(--accent); width: 90%; max-width: 450px; border-radius: 15px; padding: 25px; text-align: center; }
        
        .ans-input { width: 100%; background: #000; border: 1px solid var(--accent); color: #fff; padding: 12px; font-size: 1.8rem; text-align: center; font-family: 'Orbitron'; margin: 15px 0; border-radius: 8px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-family: 'Orbitron'; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .btn-primary { background: var(--accent); color: #000; margin-bottom: 10px; }

        footer { padding: 10px; background: rgba(0,0,0,0.8); display: flex; justify-content: center; }
        .nav-btn { color: var(--accent); text-decoration: none; font-weight: bold; }

        .joker-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .joker-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); padding: 8px; border-radius: 5px; font-size: 0.6rem; cursor: pointer; }
        .joker-btn.active { border-color: var(--accent); background: rgba(0,210,255,0.2); }
        .joker-btn.used { opacity: 0.2; pointer-events: none; }
    </style>
</head>
<body>

    <header>
        <div class="logo">QUIZ PULSE // SPACE</div>
        <div id="player-tag" style="color: var(--accent);">PILOT: ---</div>
    </header>

    <div class="game-container">
        <div class="stats-panel">
            <div class="stat-box">
                <div class="stat-label">System-HP</div>
                <div class="stat-value" id="hp-val">100</div>
                <div class="hp-bar"><div id="hp-bar-fill"></div></div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score-val">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Fortschritt</div>
                <div class="stat-value"><span id="q-count">0</span>/20</div>
            </div>

            <div class="stat-label">Joker-Module</div>
            <div class="joker-grid">
                <div id="j-Schild" class="joker-btn" onclick="useJoker('Schild')">🛡️ Schild</div>
                <div id="j-Trank" class="joker-btn" onclick="useJoker('Trank')">🧪 Nano</div>
                <div id="j-Schwert" class="joker-btn" onclick="useJoker('Schwert')">⚔️ Boost</div>
            </div>

            <!-- GEÄNDERTER INPUT FÜR BESSERE KOMPATIBILITÄT -->
            <button onclick="document.getElementById('excel-input').click()" style="margin-top:auto; background:var(--accent); color:#000;">DATEN-KERN LADEN</button>
            <input type="file" id="excel-input" style="display:none" accept=".xlsx, .xls">
        </div>

        <div class="board-area">
            <div id="game-grid" class="grid"></div>
        </div>
    </div>

    <div id="modal-quiz" class="modal">
        <div class="modal-content" id="modal-inner">
            <div id="m-cat" style="color:var(--accent); font-size:0.8rem;">CAT</div>
            <h2 id="m-q">Lade...</h2>
            <input type="number" id="ans-input" class="ans-input">
            <div id="m-feedback" style="margin-bottom:10px;"></div>
            <button id="btn-submit" class="btn-primary" onclick="checkAnswer()">Senden</button>
            <button id="btn-next" class="btn-primary" style="display:none;" onclick="nextRound()">Weiter</button>
        </div>
    </div>

    <script>
        // GLOBALE VARIABLEN
        let questions = [];
        let hp = 100, score = 0, qCounter = 0, currentIdx = -1;
        let catUsage = {};
        let usedJokers = { Schild:false, Trank:false, Schwert:false }, activeJoker = null;

        // INITIALISIERUNG
        window.onload = () => {
            document.getElementById('player-tag').innerText = "PILOT: " + (localStorage.getItem('quiz_username') || "Unbekannt");
            
            // Datei-Upload Listener
            document.getElementById('excel-input').addEventListener('change', handleFile, false);
            
            // Falls schon Daten da sind
            const saved = localStorage.getItem('p0_v3');
            if(saved) {
                questions = JSON.parse(saved);
                renderBoard();
            }
        };

        // DIE DATEI-LOGIK (FEHLERTOLERANT)
        function handleFile(e) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, {type: 'array'});
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);

                    if(!json || json.length === 0) throw new Error("Excel leer");

                    // Mapping wie im Comic-Modus
                    questions = json.map(row => {
                        // Hilfsfunktion um Spaltennamen zu finden (egal ob Groß/Klein)
                        const getVal = (names) => {
                            const key = Object.keys(row).find(k => names.includes(k.toLowerCase().trim()));
                            return key ? row[key] : null;
                        };

                        return {
                            cat: getVal(['kategorie', 'cat', 'thema']) || "Allgemein",
                            q: getVal(['frage', 'question', 'q']) || "Keine Frage?",
                            a: parseInt(getVal(['antwort', 'answer', 'a'])) || 0,
                            isBoss: String(getVal(['boss', 'endgegner'])).toLowerCase() === 'ja',
                            used: false
                        };
                    });

                    localStorage.setItem('p0_v3', JSON.stringify(questions));
                    alert(questions.length + " Fragen geladen!");
                    renderBoard();
                } catch (err) {
                    console.error(err);
                    alert("FEHLER: " + err.message + "\nBitte prüfe ob 'Frage' und 'Antwort' in der Excel stehen.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function renderBoard() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = "";
            const cats = [...new Set(questions.filter(q => !q.isBoss).map(q => q.cat))];

            cats.forEach(cat => {
                const count = catUsage[cat] || 0;
                const card = document.createElement('div');
                card.className = "card" + (count >= 2 ? " disabled" : "");
                card.innerHTML = `<div style="color:var(--accent)">${cat}</div><small>${count}/2</small>`;
                if(count < 2) {
                    card.onclick = () => {
                        const pool = questions.filter(q => q.cat === cat && !q.used);
                        if(pool.length > 0) {
                            currentIdx = questions.indexOf(pool[Math.floor(Math.random()*pool.length)]);
                            catUsage[cat] = count + 1;
                            openQuestion(questions[currentIdx]);
                        }
                    };
                }
                grid.appendChild(card);
            });
            updateUI();
        }

        function openQuestion(q) {
            document.getElementById('m-cat').innerText = q.cat;
            document.getElementById('m-q').innerText = q.q;
            document.getElementById('ans-input').value = "";
            document.getElementById('m-feedback').innerText = "";
            document.getElementById('btn-submit').style.display = "block";
            document.getElementById('btn-next').style.display = "none";
            document.getElementById('modal-quiz').style.display = "flex";
        }

        function checkAnswer() {
            const q = questions[currentIdx];
            const guess = parseInt(document.getElementById('ans-input').value);
            if(isNaN(guess)) return;

            let diff = Math.abs(guess - q.a);
            if(activeJoker === 'Schild' && diff > 10) diff = 10;
            if(activeJoker === 'Trank') diff = Math.floor(diff/2);

            if(diff === 0) {
                hp = Math.min(100, hp + 5); score += 200;
                document.getElementById('m-feedback').innerHTML = "<b style='color:var(--green)'>Treffer! +5 HP</b>";
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            } else {
                hp -= diff; score += Math.max(0, 100 - diff);
                document.getElementById('m-feedback').innerHTML = `<b style='color:var(--red)'>Schaden: -${diff}</b><br>Antwort war: ${q.a}`;
            }

            q.used = true; qCounter++;
            activeJoker = null;
            document.querySelectorAll('.joker-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-submit').style.display = "none";
            document.getElementById('btn-next').style.display = "block";
            updateUI();
        }

        function nextRound() {
            document.getElementById('modal-quiz').style.display = "none";
            if(hp <= 0) { alert("Game Over!"); location.reload(); }
            renderBoard();
        }

        function updateUI() {
            document.getElementById('hp-val').innerText = hp;
            document.getElementById('hp-bar-fill').style.width = hp + "%";
            document.getElementById('score-val').innerText = score;
            document.getElementById('q-count').innerText = qCounter;
        }

        function useJoker(type) {
            if(usedJokers[type] || activeJoker) return;
            activeJoker = type;
            usedJokers[type] = true;
            document.getElementById('j-'+type).classList.add('active', 'used');
        }
    </script>
</body>
</html>
