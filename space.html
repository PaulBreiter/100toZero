<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Space Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #0b0c10; color: #66fcf1; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #game-box { width: 600px; background: #1f2833; padding: 30px; border-radius: 15px; border: 2px solid #45a29e; text-align: center; box-shadow: 0 0 25px rgba(69, 162, 158, 0.3); }
        .screen { display: none; }
        .active { display: block; }
        .joker-container { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .joker { padding: 10px; border: 1px solid #45a29e; cursor: pointer; border-radius: 5px; min-width: 80px; transition: 0.2s; }
        .joker.active-j { background: #45a29e; color: #0b0c10; box-shadow: 0 0 15px #66fcf1; font-weight: bold; }
        .joker.used { opacity: 0.2; cursor: not-allowed; text-decoration: line-through; }
        input { background: transparent; border: 1px solid #45a29e; color: #66fcf1; padding: 10px; font-size: 1.2rem; text-align: center; width: 60%; margin: 20px 0; border-radius: 5px; }
        button { background: #45a29e; color: #0b0c10; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 5px; margin: 5px; transition: 0.2s; }
        button:hover { background: #66fcf1; }
        #hp-display { color: #ff4d4d; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; text-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
    </style>
</head>
<body>
    <div id="game-box">
        <div id="screen-upload" class="screen active">
            <h2>SYSTEM INITIALISIERUNG</h2>
            <p>Bitte lade die Fragen-Datei (.xlsx) hoch:</p>
            <input type="file" id="upload" accept=".xlsx">
            <br><br>
            <button style="background: transparent; color: #45a29e; border: 1px solid #45a29e;" onclick="window.location.href='index.html'">ZURÜCK ZUM HAUPTMENÜ</button>
        </div>

        <div id="screen-game" class="screen">
            <div id="hp-display">SCHILDE: <span id="hp">5000</span></div>
            <div>STATUS: Frage <span id="q-num">1</span>/20</div>
            <div class="joker-container">
                <div id="j-50" class="joker" onclick="toggleJoker('50')">50:50</div>
                <div id="j-hint" class="joker" onclick="toggleJoker('hint')">SCAN</div>
                <div id="j-skip" class="joker" onclick="toggleJoker('skip')">SKIP</div>
            </div>
            <h3 id="q-text">Lade Daten...</h3>
            <input type="number" id="ans" placeholder="Wert eingeben...">
            <br>
            <button onclick="submit()">FEUERN</button>
        </div>
    </div>

    <script>
        let allQ = [], gameQ = [], idx = 0, hp = 5000, activeJoker = null, used = { '50':false, 'hint':false, 'skip':false };

        document.getElementById('upload').addEventListener('change', e => {
            const reader = new FileReader();
            reader.onload = ev => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                allQ = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(allQ.length > 0) start();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function start() {
            gameQ = allQ.sort(() => 0.5 - Math.random()).slice(0, 20);
            document.getElementById('screen-upload').classList.remove('active');
            document.getElementById('screen-game').classList.add('active');
            render();
        }

        function toggleJoker(t) {
            if(used[t]) return;
            activeJoker = (activeJoker === t) ? null : t; 
            updateUI();
        }

        function updateUI() {
            ['50','hint','skip'].forEach(t => {
                const el = document.getElementById('j-'+t);
                el.className = 'joker' + (used[t] ? ' used' : (activeJoker === t ? ' active-j' : ''));
            });
        }

        function render() {
            document.getElementById('q-text').innerText = gameQ[idx].Frage;
            document.getElementById('hp').innerText = Math.round(hp);
            document.getElementById('q-num').innerText = idx + 1;
            document.getElementById('ans').value = "";
            updateUI();
        }

        function submit() {
            const val = parseFloat(document.getElementById('ans').value);
            const correct = parseFloat(gameQ[idx].Antwort);
            if(isNaN(val) && activeJoker !== 'skip') return;

            if(activeJoker === 'skip') { used.skip = true; }
            else if(activeJoker === 'hint') {
                alert("Scan zeigt: Wert liegt bei ca. " + (correct * (0.8 + Math.random()*0.4)).toFixed(0));
                used.hint = true; activeJoker = null; updateUI(); return;
            } else {
                let diff = Math.abs(val - correct);
                if(activeJoker === '50') { diff /= 2; used['50'] = true; }
                hp -= diff;
            }
            activeJoker = null; idx++;
            if(hp <= 0 || idx >= 20) { 
                alert(hp > 0 ? "Mission erfolgreich! " + hp + " HP verbleibend." : "Hülle zerstört! Game Over."); 
                location.reload(); 
            } else render();
        }
    </script>
</body>
</html>
