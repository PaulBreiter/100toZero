<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Quiz - Space Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { background: #0f0e17; color: #a7a9be; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        #game-container { width: 550px; background: #16161a; padding: 30px; border-radius: 10px; border: 2px solid #7f5af0; text-align: center; position: relative; }
        .screen { display: none; }
        .active { display: block; }
        /* Joker */
        .joker-row { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .joker { padding: 8px 15px; border: 1px solid #7f5af0; cursor: pointer; color: #fffffe; border-radius: 4px; font-size: 0.9rem; transition: 0.2s; }
        .joker.selected { background: #7f5af0; box-shadow: 0 0 15px #7f5af0; }
        .joker.used { opacity: 0.2; cursor: not-allowed; text-decoration: line-through; }
        /* UI Elements */
        #hp-display { font-size: 1.5rem; color: #ff8906; margin-bottom: 10px; font-weight: bold; }
        input { background: #242629; border: 1px solid #7f5af0; color: #fffffe; padding: 12px; width: 60%; text-align: center; font-size: 1.2rem; margin: 15px 0; }
        button { background: #7f5af0; color: #fffffe; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .btn-back { background: #242629; color: #94a1b2; margin-top: 20px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="game-container">
        <!-- Screen 1: Upload -->
        <div id="screen-upload" class="screen active">
            <h2>Hangar: Daten-Upload</h2>
            <p>Bitte lade die Excel-Datei mit den Fragen hoch.</p>
            <input type="file" id="upload-input" accept=".xlsx">
            <br>
            <button class="btn-back" onclick="window.location.href='index.html'">Abbrechen & Zurück zum Hauptmenü</button>
        </div>

        <!-- Screen 2: Game -->
        <div id="screen-game" class="screen">
            <div id="hp-display">ENERGIE: <span id="hp-val">5000</span></div>
            <div id="info-row">Frage <span id="q-idx">1</span>/20</div>
            <div class="joker-row">
                <div id="j-50" class="joker" onclick="toggleJoker('50')">50:50</div>
                <div id="j-hint" class="joker" onclick="toggleJoker('hint')">SCAN</div>
                <div id="j-skip" class="joker" onclick="toggleJoker('skip')">WARP</div>
            </div>
            <p id="cat-text" style="color:#72757e; font-size: 0.8rem; text-transform: uppercase;"></p>
            <h3 id="q-text">Lade Daten...</h3>
            <input type="number" id="user-input" placeholder="Schätzung...">
            <br>
            <button onclick="checkAnswer()">IMPULS FEUERN</button>
        </div>
    </div>

    <script>
        let questions = [], currentArr = [], idx = 0, hp = 5000, activeJoker = null, used = { '50': false, 'hint': false, 'skip': false };

        document.getElementById('upload-input').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = new Uint8Array(ev.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                questions = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(questions.length > 0) startGame();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function startGame() {
            currentArr = questions.sort(() => 0.5 - Math.random()).slice(0, 20);
            show('screen-game');
            render();
        }

        function toggleJoker(type) {
            if(used[type]) return;
            activeJoker = (activeJoker === type) ? null : type;
            updateJokerUI();
        }

        function updateJokerUI() {
            ['50', 'hint', 'skip'].forEach(t => {
                const el = document.getElementById('j-' + t);
                el.className = 'joker' + (used[t] ? ' used' : (activeJoker === t ? ' selected' : ''));
            });
        }

        function render() {
            const q = currentArr[idx];
            document.getElementById('q-text').innerText = q.Frage;
            document.getElementById('cat-text').innerText = q.Kategorie;
            document.getElementById('hp-val').innerText = Math.round(hp);
            document.getElementById('q-idx').innerText = idx + 1;
            document.getElementById('user-input').value = "";
            updateJokerUI();
        }

        function checkAnswer() {
            const val = parseFloat(document.getElementById('user-input').value);
            const correct = parseFloat(currentArr[idx].Antwort);
            if(isNaN(val) && activeJoker !== 'skip') return;

            if(activeJoker === 'skip') {
                used.skip = true;
            } else if(activeJoker === 'hint') {
                alert("Scan-Ergebnis: Der Wert liegt zwischen " + (correct * 0.7).toFixed(0) + " und " + (correct * 1.3).toFixed(0));
                used.hint = true; activeJoker = null; updateJokerUI(); return;
            } else {
                let diff = Math.abs(val - correct);
                if(activeJoker === '50') { diff /= 2; used['50'] = true; }
                hp -= diff;
            }

            activeJoker = null;
            idx++;
            if(hp <= 0 || idx >= 20) {
                alert(hp > 0 ? "Mission erfolgreich!" : "System kritisch - Game Over!");
                location.reload();
            } else {
                render();
            }
        }

        function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
